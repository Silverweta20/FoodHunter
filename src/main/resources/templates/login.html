<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio sesión</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-badge">💬</div>
        </div>

        <h1 class="auth-title">Inicio sesión</h1>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form class="auth-form" th:action="@{/login}" method="post">
            <label for="email">Correo</label>
            <input
                    id="email"
                    type="email"
                    name="email"
                    placeholder="ejemplo@email.com"
                    required
                    autofocus>

            <label for="password">Contraseña</label>
            <input
                    id="password"
                    type="password"
                    name="password"
                    placeholder="••••••"
                    required>

            <button type="submit" class="btn btn-primary">Ingresar</button>
        </form>

        <div class="auth-links">
            <a href="#">Olvidó la contraseña</a>
            <a th:href="@{/register}">Regístrate</a>
        </div>

        <div th:if="${showRegister}" class="register-box">
            <h2>Crear cuenta institucional</h2>
            <form class="auth-form" th:action="@{/register}" method="post">
                <label for="alias">Alias</label>
                <input
                        id="alias"
                        type="text"
                        name="alias"
                        placeholder="Tu alias"
                        required
                        minlength="3"
                        maxlength="50">

                <label for="registerEmail">Correo institucional</label>
                <input
                        id="registerEmail"
                        type="email"
                        name="email"
                        placeholder="nombre@universidad.edu.co"
                        required>


                <label for="registerPassword">Contraseña</label>
                <input
                        id="registerPassword"
                        type="password"
                        name="password"
                        placeholder="••••••"
                        required
                        minlength="6">

                <button type="submit" class="btn btn-primary">Registrarme</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
