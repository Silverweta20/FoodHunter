<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurantes - Mapa</title>
    <link rel="stylesheet" th:href="@{/css/map.css}" href="../static/css/map.css">
    <style>
        #googleMap {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,.08);
        }

        .map-section {
            padding: 16px 14px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-small {
            padding: 10px 14px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 13px;
        }

        .btn-small:hover {
            border-color: #1d5cff;
            color: #1d5cff;
        }

        .btn-small.active {
            background: #1d5cff;
            color: #fff;
            border-color: #1d5cff;
        }

        .restaurant-footer a {
            color: #1d5cff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .restaurant-footer a:hover {
            color: #1e40af;
            text-decoration: underline;
        }
    </style>
</head>
<body class="app-page">
<div class="app-shell">
    <header class="topbar">
        <div>
            <p class="eyebrow" th:text="${user != null ? 'Hola, ' + user.alias : 'Explora'}">Explora</p>
            <h1>Restaurantes en Mapa</h1>
        </div>
        <a th:href="@{/profile}" class="pill-link">Mi perfil</a>
    </header>

    <section class="search-card">
        <div class="search-row">
            <input id="mapSearch" type="search" placeholder="Buscar restaurantes...">
        </div>

        <div class="filter-grid">
            <button id="centerMapBtn" class="btn-small" type="button">📍 Ubicación</button>
            <button id="showAllBtn" class="btn-small active" type="button">Todos</button>
            <button id="showVisitedBtn" class="btn-small" type="button">Visitados</button>
        </div>

        <div class="subtle-link-row">
            <span id="restaurantCount">📍 Mostrando <strong th:text="${restaurants.size()}">0</strong> restaurantes</span>
        </div>
    </section>

    <section class="map-section">
        <div id="googleMap"></div>
        <p id="geoInfo" style="text-align: center; font-size: 12px; color: #667085; margin: 8px 0;">Cargando ubicación...</p>
    </section>

    <section class="content-section">
        <h2 id="badge-count">📍 Restaurantes</h2>
        <div id="restaurantsList" class="restaurant-list">
            <a th:href="@{/restaurants/{id}(id=${restaurant.id})}" class="restaurant-card mini" th:each="restaurant : ${restaurants}">
                <img th:src="${restaurant.heroImageUrl}" alt="restaurant">
                <div class="restaurant-card-body">
                    <div>
                        <h3 th:text="${restaurant.name}">Nombre</h3>
                        <p th:text="${restaurant.location}">Ubicación</p>
                    </div>
                    <div class="restaurant-score">
                        <span>⭐</span>
                        <strong th:text="${restaurant.rating}">4.8</strong>
                    </div>
                </div>
                <div class="restaurant-footer">
                    <span class="view-btn">Abrir →</span>
                </div>
            </a>
        </div>
    </section>

    <section id="visitedSection" class="content-section" style="display: none;">
        <h2>Restaurantes Visitados</h2>
        <div id="visitedRestaurantsList" class="restaurant-list"></div>
    </section>

    <nav class="bottom-nav">
        <a th:href="@{/home}">🏠</a>
        <a class="active" th:href="@{/map}">📍</a>
        <a th:href="@{/profile}">👤</a>
    </nav>
</div>

<script th:src="'https://maps.googleapis.com/maps/api/js?key=' + ${googleMapsApiKey} + '&libraries=geometry'"
        src="https://maps.googleapis.com/maps/api/js?key=demo-key-fallback&libraries=geometry"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    window.restaurantsList = /*[[${restaurants}]]*/ [];
    /*]]>*/
</script>

<script th:src="@{/js/map.js}" src="../static/js/map.js"></script>
</body>
</html>
